services:
  app:
    build: .
    container_name: consultas-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - "${DATA_DIR:-./data}:/data"
    environment:
      - PORT=3000
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  consultas_data:
    driver: local
